<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Learning Adventure</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <!-- Floating Clouds Background -->
  <div class="cloud" style="top: 10%; left: 5%;"></div>
  <div class="cloud" style="top: 25%; right: 10%;"></div>
  <div class="cloud" style="top: 60%; left: 15%;"></div>

  <header>
    <div class="logo-area">
      <h1>KIDS LEARNING ADVENTURE 🎡</h1>
      <p>The funnest way to explore the world!</p>
    </div>
  </header>

  <main class="park-map" id="learning-map">
    <div class="attraction-card" data-region="space">
      <span class="attraction-icon">🛸</span>
      <h2 class="attraction-title">Galaxy Ride</h2>
    </div>
    <div class="attraction-card" data-region="ocean">
      <span class="attraction-icon">🐋</span>
      <h2 class="attraction-title">Deep Sea Quest</h2>
    </div>
    <div class="attraction-card" data-region="nature">
      <span class="attraction-icon">🦁</span>
      <h2 class="attraction-title">Safari Journey</h2>
    </div>
  </main>

  <!-- Improved Mascot Guide -->
  <div class="mascot-wrap">
    <div class="speech-bubble" id="speech-bubble">
      Welcome to the Park! 🎡 I'm Buddy, your adventure guide! Tap a ride to start your journey!
    </div>
    <div class="mascot">
      <div class="mascot-cap"></div>
      <div class="mascot-eye eye-left"></div>
      <div class="mascot-eye eye-right"></div>
      <div class="mascot-blush blush-left"></div>
      <div class="mascot-blush blush-right"></div>
      <div class="mascot-mouth"></div>
    </div>
  </div>

  <div id="disqus_thread" style="margin-top: 100px; width: 80%; max-width: 800px; background: white; padding: 20px; border-radius: 30px;"></div>
  <script>
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://product-builder-lec.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
